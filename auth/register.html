<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Invoicent</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1><i class="fas fa-file-invoice-dollar"></i> Invoicent</h1>
                <p>Create Your Account</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="first_name">First Name</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="first_name" name="first_name" placeholder="John" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="last_name">Last Name</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="last_name" name="last_name" placeholder="Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Min 8 chars with uppercase, number, special char" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <small>Min 8 characters. Must include uppercase, lowercase, number, and special character (@$!%*?&)</small>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div id="errorMessages" class="error-messages"></div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-check"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        registerUser();
    });

    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        const type = field.type === 'password' ? 'text' : 'password';
        field.type = type;
    }

    async function registerUser() {
        const form = document.getElementById('registerForm');
        const errorDiv = document.getElementById('errorMessages');
        errorDiv.innerHTML = '';

        // 1. Fetch the fresh security token with fallback checking
        const freshCsrfToken = await getCSRFToken();
        if (!freshCsrfToken) {
            showError('Security verification failed. Please refresh the page and try again.');
            return;
        }

        const formData = new FormData(form);
        const data = {
            first_name: formData.get('first_name'),
            last_name: formData.get('last_name'),
            email: formData.get('email'),
            password: formData.get('password'),
            confirm_password: formData.get('confirm_password'),
            csrf_token: freshCsrfToken // <-- Clean token safely mapped here
        };

        try {
            const response = await fetch('../api/register.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                showSuccess(result.message);
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                if (result.errors) {
                    errorDiv.innerHTML = result.errors.map(err => 
                        `<div class="error-item"><i class="fas fa-exclamation-circle"></i> ${err}</div>`
                    ).join('');
                } else {
                    showError(result.message);
                }
            }
        } catch (error) {
            showError('An error occurred. Please try again.');
            console.error('Registration Error:', error);
        }
    }

    /**
     * Refactored to fetch from your live endpoint /api/csrf.php
     */
    async function getCSRFToken() {
    try {
        const response = await fetch('/api/csrf.php'); 
        
        // 1. Capture the raw response as plain text first to see errors
        const rawText = await response.text();
        console.log("RAW BACKEND RESPONSE:", rawText); // <--- LOOK AT YOUR CONSOLE FOR THIS

        // 2. Try parsing it manually
        const data = JSON.parse(rawText);
        return data.csrf_token;
    } catch (error) {
        console.error('Failed to retrieve CSRF validation token:', error);
        return null; 
    }
}


    function showSuccess(message) {
        const alert = document.createElement('div');
        alert.className = 'alert-success';
        alert.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
        document.body.insertBefore(alert, document.body.firstChild);
    }

    function showError(message) {
        const errorDiv = document.getElementById('errorMessages');
        errorDiv.innerHTML = `<div class="error-item"><i class="fas fa-exclamation-circle"></i> ${message}</div>`;
    }
</script>

</body>
</html>
